<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Математика энергетика - Стройка моста</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #0a1a2e 0%, #030c17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }
        .game-wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }
        .game-container {
            background: #1e2a32;
            background-image: radial-gradient(circle at 10% 20%, rgba(70,130,100,0.2) 1.5%, transparent 2%);
            background-size: 35px 35px;
            border-radius: 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            padding: 20px 24px 30px 24px;
            border-bottom: 6px solid #3a7a5a;
        }
        .game-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }
        .canvas-area {
            flex: 2;
            min-width: 280px;
            position: relative;
        }
        .task-panel {
            flex: 1.2;
            min-width: 260px;
            background: #0f1f1ad9;
            backdrop-filter: blur(10px);
            border-radius: 36px;
            padding: 20px 18px;
            box-shadow: inset 0 0 8px #2e6b4e, 0 8px 18px black;
            border: 1px solid #5a9e6e;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px black;
            width: 100%;
            height: auto;
            background: #0d1f18;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            gap: 12px;
            flex-wrap: wrap;
            background: #0b1815cc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #e2f5e8;
            font-weight: bold;
        }
        .score-box, .health-box, .progress-box {
            background: #00000066;
            padding: 6px 18px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.1s;
            align-items: center;
        }
        .health-box img {
            width: 40px;
            height: 40px;
            vertical-align: middle;
        }
        .score-box:active, .health-box:active, .progress-box:active {
            transform: scale(0.98);
        }
        .score-box span:first-child, .progress-box span:first-child {
            color: #ffcd7e;
        }
        .restart-btn {
            background: #ff914d;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e2a1c;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #a33f00;
        }
        .restart-btn:active {
            transform: translateY(2px);
        }
        .message-area {
            background: #071510;
            padding: 12px 16px;
            border-radius: 32px;
            font-size: 0.95rem;
            text-align: center;
            margin-top: 14px;
            color: #c6ffc1;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            border-left: 6px solid #ffaa44;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 25px;
        }
        .answer-btn {
            background: #253b30;
            border: 2px solid #5f9e72;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #f7f3c6;
            text-align: center;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #1f4d2e;
            backdrop-filter: blur(4px);
        }
        .answer-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f4d2e;
        }
        .equation-card {
            background: #0b2019;
            padding: 15px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #46b87a;
        }
        .equation-text {
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            color: #ffdfa5;
            word-break: break-word;
        }
        .question-text {
            font-size: 1.2rem;
            margin-top: 12px;
            background: #ffdfa5;
            padding: 8px;
            border-radius: 28px;
            color: #1e2a1c;
        }
        .badge-power {
            display: inline-block;
            background: #ffb347;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1d2a0e;
        }
        .admin-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            font-family: monospace;
        }
        .admin-card {
            background: #0e1a1f;
            border: 2px solid #ffaa44;
            border-radius: 48px;
            padding: 25px 20px;
            width: 750px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 40px black;
            color: #eee;
        }
        .admin-card input, .admin-card textarea {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background: #1f3a33;
            border: 1px solid #8bc34a;
            border-radius: 60px;
            color: #ffecb3;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }
        .admin-card textarea {
            border-radius: 20px;
            text-align: left;
            resize: vertical;
            font-family: inherit;
        }
        .admin-card button {
            background: #3a7a5a;
            border: none;
            padding: 10px 20px;
            margin: 8px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .admin-card button:active { transform: scale(0.97); }
        .close-admin, .delete-session-btn {
            background: #aa3e2c;
        }
        .close-game-btn {
            background: #aa3e2c;
        }
        .admin-status {
            font-size: 0.8rem;
            margin-top: 12px;
            color: #ffaa66;
        }
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #5a9e6e;
            padding-bottom: 10px;
            flex-wrap: wrap;
        }
        .admin-tab {
            background: #1f3a33;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .admin-tab.active {
            background: #ffaa44;
            color: #1e2a1c;
        }
        .admin-tab-content {
            display: none;
        }
        .admin-tab-content.active {
            display: block;
        }
        .logs-container, .sessions-container {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.8rem;
            background: #0b1815;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
        }
        .session-item {
            background: #1a2c25;
            margin: 8px 0;
            padding: 10px;
            border-radius: 20px;
            border-left: 4px solid #ffaa44;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .session-info {
            flex: 1;
            word-break: break-word;
        }
        .session-id { font-weight: bold; color: #ffdfa5; font-size: 1rem; }
        .session-meta { font-size: 0.7rem; color: #8aa; margin-top: 4px; }
        .online-status { 
            display: inline-block; 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
            margin-right: 6px;
        }
        .online-status.online { background-color: #4caf50; box-shadow: 0 0 5px #4caf50; }
        .online-status.offline { background-color: #888; }
        .block-btn { background: #aa3e2c; padding: 5px 12px; font-size: 0.75rem; }
        .unblock-btn { background: #3a7a5a; padding: 5px 12px; font-size: 0.75rem; }
        .delete-session-btn { background: #6b2e1e; padding: 5px 12px; font-size: 0.75rem; margin-left: 5px; }
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #2e6b4e;
            font-family: monospace;
        }
        .log-entry.success { color: #8bc34a; }
        .log-entry.failed { color: #ff8866; }
        .log-entry.admin-action { color: #ffaa44; }
        .clear-logs-btn {
            background: #aa3e2c;
            margin-top: 10px;
            font-size: 0.8rem;
            padding: 5px 12px;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ffdfa5;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #3a7a5a;
            border-top: 6px solid #ffaa44;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @media (max-width: 780px) {
            .game-layout { flex-direction: column; }
            .answer-btn { padding: 10px 5px; font-size: 1.2rem; }
            .equation-text { font-size: 1rem; }
            .info-panel { gap: 8px; }
            .admin-card { width: 95%; }
            .admin-tabs { flex-wrap: wrap; }
            .health-box img { width: 32px; height: 32px; }
        }
        .game-closed-overlay, .blocked-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            z-index: 20000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: #ff8866;
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
        }
        .blocked-overlay .closed-text, .game-closed-overlay .closed-text { font-size: 2.5rem; color: #ff4444; }
        .blocked-overlay .closed-subtext { font-size: 1.2rem; color: #ffaa66; }
        
        .global-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffaa44, #ff6600);
            color: #1e2a1c;
            padding: 15px 30px;
            border-radius: 60px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 30000;
            box-shadow: 0 0 30px rgba(255,100,0,0.5);
            border: 2px solid #fff3c9;
            text-align: center;
            max-width: 90%;
            animation: slideDown 0.3s ease-out;
            cursor: pointer;
        }
        @keyframes slideDown {
            from { top: -100px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <div class="game-layout">
            <div class="canvas-area">
                <canvas id="powerCanvas" width="750" height="420" style="width:100%; height:auto; aspect-ratio:750/420"></canvas>
            </div>
            <div class="task-panel">
                <div class="equation-card">
                    <span class="badge-power">⚡ РАСЧЁТ ЭНЕРГОСИСТЕМЫ ⚡</span>
                    <div class="equation-text" id="eqDisplay">Загрузка задач...</div>
                    <div class="question-text" id="questionDisplay">Пожалуйста, подождите</div>
                </div>
                <div class="answers-grid" id="answersContainer"></div>
                <div class="message-area" id="gameMessage">
                    🎛️ Загрузка задач...
                </div>
            </div>
        </div>
        <div class="info-panel">
            <div class="score-box" id="secretTapArea">
                <span>🔋 МЕГАВАТТЫ</span>
                <span id="scoreValue">0</span>
            </div>
            <div class="health-box">
                <img id="healthIcon" src="https://i.imgur.com/rHRy49i.png" alt="сердце">
            </div>
            <div class="progress-box"><span>📡 ПРОГРЕСС</span><span id="bridgeProgress">0/15</span></div>
            <button class="restart-btn" id="restartGame">⟳ ПЕРЕЗАПУСК</button>
        </div>
    </div>
</div>
<div id="adminModal" class="admin-modal">
    <div class="admin-card">
        <h3>⚡ АДМИН-ПАНЕЛЬ ⚡</h3>
        <div class="admin-tabs">
            <div class="admin-tab" data-tab="auth">🔐 ВХОД</div>
            <div class="admin-tab" data-tab="actions" style="display:none;">🎮 ДЕЙСТВИЯ</div>
            <div class="admin-tab" data-tab="settings" style="display:none;">⚙️ НАСТРОЙКИ</div>
            <div class="admin-tab" data-tab="sessions" style="display:none;">👥 СЕССИИ</div>
            <div class="admin-tab" data-tab="messages" style="display:none;">💬 СООБЩЕНИЯ</div>
            <div class="admin-tab" data-tab="logs" style="display:none;">📋 ЛОГИ</div>
        </div>
        <div id="tab-auth" class="admin-tab-content">
            <input type="password" id="adminCodeInput" placeholder="Введите код администратора" autocomplete="off">
            <div>
                <button id="adminAuthBtn">🔑 ВОЙТИ</button>
                <button id="adminCloseBtn" class="close-admin">✖️ ЗАКРЫТЬ</button>
            </div>
            <div class="admin-status" id="adminLoginMsg">Введите код администратора</div>
        </div>
        <div id="tab-actions" class="admin-tab-content">
            <button id="instaWinsBtn">🏆 МГНОВЕННАЯ ПОБЕДА</button>
            <button id="addLivesBtn">❤️ +1 ЖИЗНЬ</button>
            <div class="admin-status" id="adminStatusMsg"></div>
        </div>
        <div id="tab-settings" class="admin-tab-content">
            <button id="closeGameBtn" class="close-game-btn">🔒 ЗАКРЫТЬ ИГРУ</button>
            <button id="openGameBtn" style="background:#3a7a5a;">🔓 ОТКРЫТЬ ИГРУ</button>
            <div class="admin-status" id="settingsStatusMsg"></div>
        </div>
        <div id="tab-sessions" class="admin-tab-content">
            <div class="sessions-container" id="sessionsContainer">Загрузка пользователей...</div>
            <div class="admin-status" id="sessionsStatusMsg"></div>
        </div>
        <div id="tab-messages" class="admin-tab-content">
            <textarea id="globalMessageInput" rows="3" placeholder="Введите глобальное сообщение для всех игроков..."></textarea>
            <button id="sendGlobalMessageBtn">📢 ОТПРАВИТЬ СООБЩЕНИЕ</button>
            <button id="clearGlobalMessageBtn">🗑️ ОЧИСТИТЬ СООБЩЕНИЕ</button>
            <div class="admin-status" id="messagesStatusMsg"></div>
        </div>
        <div id="tab-logs" class="admin-tab-content">
            <div class="logs-container" id="logsContainer">Загрузка логов...</div>
            <button id="clearLogsBtn" class="clear-logs-btn">🗑️ ОЧИСТИТЬ ЛОГИ</button>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCGrfi8JM8UseO0m3qQuQc_ZuGnxXxXYgE",
        authDomain: "igra-82a42.firebaseapp.com",
        databaseURL: "https://igra-82a42-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "igra-82a42",
        storageBucket: "igra-82a42.firebasestorage.app",
        messagingSenderId: "246552412786",
        appId: "1:246552412786:web:013a67819cfc816683b8eb"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const ADMIN_PASSWORDS = {
        "14881161": { name: "Главный администратор", emoji: "👑", access: "full" },
        "148867": { name: "Помощник", emoji: "⭐", access: "actions_only" }
    };  
    let ALL_TASKS = [];
    let TASKS_LEVEL_1 = [];
    let TASKS_LEVEL_2 = [];
    let TASKS_LEVEL_3 = [];
    let gameReady = false;
    const TARGET_CORRECT = 15;
    let correctCount = 0;
    let gameActive = true;
    let victoryFlag = false;
    let usedTasks = [];
    let gameClosed = false;
    let score = 0;
    let health = 3;
    let currentProblem = null;
    let optionsArray = [];
    let waitForAnswer = false;
    let nextTimer = null;
    let currentUID = null;
    let isBlocked = false;
    let presenceRef = null;
    
    const canvas = document.getElementById('powerCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 750;
    canvas.height = 420;
    const scoreSpan = document.getElementById('scoreValue');
    const healthIcon = document.getElementById('healthIcon');
    const bridgeProgressSpan = document.getElementById('bridgeProgress');
    const messageDiv = document.getElementById('gameMessage');
    const eqDisplay = document.getElementById('eqDisplay');
    const questionDisplay = document.getElementById('questionDisplay');
    const answersContainer = document.getElementById('answersContainer');
    let isAdminMode = false;
    let currentAdminName = "";
    let currentAdminAccess = "";
    const loadingOverlay = document.createElement('div');
    loadingOverlay.className = 'loading-overlay';
    loadingOverlay.innerHTML = `<div class="spinner"></div><div>Загрузка задач...</div>`;
    document.body.appendChild(loadingOverlay);
    
    function celebrateVictory() {
        canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, startVelocity: 20 });
        setTimeout(() => {
            canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.5, x: 0.2 }, startVelocity: 25 });
        }, 150);
        setTimeout(() => {
            canvasConfetti({ particleCount: 300, spread: 120, origin: { y: 0.5, x: 0.8 }, startVelocity: 25 });
        }, 300);
        setTimeout(() => {
            canvasConfetti({ particleCount: 500, spread: 150, origin: { y: 0.4 }, startVelocity: 30, decay: 0.9 });
        }, 500);
        for(let i = 0; i < 5; i++) {
            setTimeout(() => {
                canvasConfetti({ particleCount: 100, spread: 80, origin: { y: 0.7, x: Math.random() }, startVelocity: 15 });
            }, 800 + i * 200);
        }
    }
    
    let globalMessageDiv = null;
    function showGlobalMessage(message, isError = false) {
        if (globalMessageDiv) globalMessageDiv.remove();
        globalMessageDiv = document.createElement('div');
        globalMessageDiv.className = 'global-message';
        globalMessageDiv.style.background = isError ? 'linear-gradient(135deg, #ff4444, #cc0000)' : 'linear-gradient(135deg, #ffaa44, #ff6600)';
        globalMessageDiv.innerHTML = message;
        globalMessageDiv.onclick = () => globalMessageDiv.remove();
        document.body.appendChild(globalMessageDiv);
        setTimeout(() => {
            if (globalMessageDiv) globalMessageDiv.remove();
        }, 8000);
    }
    
    function listenGlobalMessages() {
        db.ref('admin/globalMessage').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.text && data.text.trim()) {
                showGlobalMessage(data.text, data.isError || false);
            }
        });
    }
    
    function getDeviceName() {
        const ua = navigator.userAgent;
        let device = "💻 Неизвестное устройство";
        if (/iPhone|iPad|iPod/i.test(ua)) device = "🍎 Apple " + (navigator.platform || "iOS");
        else if (/Android/i.test(ua)) { const match = ua.match(/Android\s([\d.]+)/); device = "📱 Android" + (match ? " " + match[1] : ""); }
        else if (/Windows/i.test(ua)) device = "💻 Windows PC";
        else if (/Mac/i.test(ua)) device = "🍏 Mac";
        else if (/Linux/i.test(ua)) device = "🐧 Linux";
        if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) device += " (Chrome)";
        else if (/Firefox/i.test(ua)) device += " (Firefox)";
        else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) device += " (Safari)";
        else if (/Edg/i.test(ua)) device += " (Edge)";
        return device;
    }
    
    async function setOnlineStatus(uid, isOnline) {
        if (!uid) return;
        await db.ref(`users/${uid}/info/online`).set(isOnline);
        await db.ref(`users/${uid}/info/lastSeen`).set(Date.now());
        if (isOnline) {
            await db.ref(`users/${uid}/info/lastSeenDate`).set(new Date().toLocaleString('ru-RU'));
        }
    }
    
    async function registerOrUpdateUser(uid) {
        if (!uid) return;
        const deviceName = getDeviceName();
        const userRef = db.ref(`users/${uid}`);
        const snapshot = await userRef.child('info').once('value');
        if (!snapshot.exists()) {
            await userRef.child('info').set({
                firstSeen: Date.now(),
                firstSeenDate: new Date().toLocaleString('ru-RU'),
                lastSeen: Date.now(),
                lastSeenDate: new Date().toLocaleString('ru-RU'),
                uid: uid,
                deviceName: deviceName,
                userAgent: navigator.userAgent,
                isBlocked: false,
                online: true
            });
        } else {
            await userRef.child('info').update({ 
                lastSeen: Date.now(),
                lastSeenDate: new Date().toLocaleString('ru-RU'),
                deviceName: deviceName,
                userAgent: navigator.userAgent,
                online: true
            });
        }
        const blockSnap = await userRef.child('info/isBlocked').once('value');

    // ========== ГЛАВНОЕ ИСПРАВЛЕНИЕ: МОСТ ЗАКРАШИВАЕТСЯ ПОСТЕПЕННО ==========
    function drawGame() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const grad = ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0,'#0d2818'); grad.addColorStop(1,'#06120c');
        ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.shadowBlur=10;
        
        // Опоры моста
        ctx.fillStyle='#5a7a6a'; ctx.fillRect(80,160,15,120); ctx.fillRect(60,160,55,10); ctx.fillRect(70,140,35,25);
        ctx.fillStyle='#aa8866'; for(let i=0;i<3;i++) ctx.fillRect(85,170+i*15,5,8);
        ctx.fillStyle='#5a7a6a'; ctx.fillRect(650,160,15,120); ctx.fillRect(630,160,55,10); ctx.fillRect(640,140,35,25);
        ctx.fillStyle='#aa8866'; for(let i=0;i<3;i++) ctx.fillRect(655,170+i*15,5,8);
        
        // Точки моста
        const points = [{x:95,y:175},{x:200,y:165},{x:310,y:180},{x:420,y:160},{x:530,y:175},{x:650,y:170}];
        
        // Рисуем контур моста (серый)
        ctx.beginPath(); ctx.moveTo(points[0].x,points[0].y);
        for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x,points[i].y);
        ctx.strokeStyle='#4a5b55'; ctx.lineWidth=6; ctx.stroke();
        
        // РАСЧЁТ ЗАКРАШЕННОЙ ЧАСТИ (ПОСТЕПЕННО!)
        let totalLen=0; 
        for(let i=0;i<points.length-1;i++) totalLen+=Math.hypot(points[i+1].x-points[i].x,points[i+1].y-points[i].y);
        
        // Прогресс: сколько секций моста построено (каждый правильный ответ = 1 секция)
        let progress = Math.min(1, correctCount / TARGET_CORRECT);
        let built = totalLen * progress;
        
        // Рисуем закрашенную часть моста (золотую)
        let acc = 0, started = false;
        ctx.beginPath();
        for(let i=0;i<points.length-1;i++){
            const p1=points[i],p2=points[i+1],seg=Math.hypot(p2.x-p1.x,p2.y-p1.y);
            if(acc+seg<=built){ 
                if(!started){ctx.moveTo(p1.x,p1.y);started=true;} 
                ctx.lineTo(p2.x,p2.y); 
                acc+=seg;
            } else if(acc<built){ 
                let t=(built-acc)/seg; 
                let x=p1.x+(p2.x-p1.x)*t,y=p1.y+(p2.y-p1.y)*t; 
                if(!started) ctx.moveTo(p1.x,p1.y); 
                ctx.lineTo(x,y); 
                break;
            }
        }
        ctx.strokeStyle='#ffdd66'; ctx.lineWidth=5; ctx.stroke();
        
        // Дополнительный эффект - светящиеся шары на построенных секциях
        for(let i = 0; i < correctCount; i++) {
            let segmentProgress = i / TARGET_CORRECT;
            let pos = getPointAtLength(points, totalLen * segmentProgress);
            if(pos) {
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc33';
                ctx.fill();
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffaa';
                ctx.fill();
            }
        }
        
        // Домик/подстанция
        ctx.fillStyle='#8a7a5a'; ctx.fillRect(380,240,60,40);
        ctx.fillStyle='#aa9a7a'; ctx.fillRect(390,230,40,15);
        ctx.fillStyle='#ccaa66'; ctx.font="16px monospace"; ctx.fillText("⚡",400,265);
        ctx.font="bold 14px monospace"; ctx.fillStyle='#ffdd99'; ctx.fillText(`📡 ПРОГРЕСС: ${correctCount}/${TARGET_CORRECT}`,canvas.width-150,40);
        
        if(victoryFlag){
            ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.font="bold 28px monospace"; ctx.fillStyle='#ffdd66'; ctx.fillText("🏆 ЭНЕРГОСЕТЬ ПОСТРОЕНА! 🏆",canvas.width/2-200,canvas.height/2);
        }
        if(health<=0 && !victoryFlag){
            ctx.fillStyle='rgba(80,0,0,0.6)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.font="bold 26px monospace"; ctx.fillStyle='#ff8866'; ctx.fillText("💥 СЕТЬ РУХНУЛА! 💥",canvas.width/2-160,canvas.height/2);
        }
        if(gameClosed && !victoryFlag){
            ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.font="bold 24px monospace"; ctx.fillStyle='#ff6666'; ctx.fillText("🔒 ИГРА ЗАКРЫТА",canvas.width/2-150,canvas.height/2);
        }
        ctx.shadowBlur=0;
    }
    
    // Вспомогательная функция для получения точки на кривой
    function getPointAtLength(points, length) {
        let totalLen = 0;
        for(let i = 0; i < points.length - 1; i++) {
            const p1 = points[i], p2 = points[i+1];
            const segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
            if(length <= totalLen + segLen) {
                const t = (length - totalLen) / segLen;
                return {
                    x: p1.x + (p2.x - p1.x) * t,
                    y: p1.y + (p2.y - p1.y) * t
                };
            }
            totalLen += segLen;
        }
        return points[points.length - 1];
    }

    function getTaskByProgress() {
        let arr = [];
        if (correctCount < 5) arr = TASKS_LEVEL_1.filter(t => !usedTasks.includes(t));
        else if (correctCount < 10) arr = TASKS_LEVEL_2.filter(t => !usedTasks.includes(t));
        else arr = TASKS_LEVEL_3.filter(t => !usedTasks.includes(t));
        if (arr.length === 0) {
            if (correctCount < 5) arr = [...TASKS_LEVEL_1];
            else if (correctCount < 10) arr = [...TASKS_LEVEL_2];
            else arr = [...TASKS_LEVEL_3];
        }
        const task = arr[Math.floor(Math.random() * arr.length)];
        usedTasks.push(task);
        return { title: task.title, equation: task.eq, question: task.question, correctAnswer: task.correct, hint: task.hint };
    }
    
    function generateOptions(correct) {
        let opts = new Set([correct]);
        while(opts.size < 4) { let delta = Math.floor(Math.random() * 21) - 10; let cand = correct + delta; if(cand < 1) cand = correct + Math.floor(Math.random() * 10) + 1; if(cand > 0 && cand < 50000) opts.add(cand); }
        return Array.from(opts).sort(() => Math.random() - 0.5);
    }

    function handleAnswer(selected) {
        if(!gameActive || waitForAnswer || victoryFlag || gameClosed || isBlocked) return;
        const correct = selected === currentProblem.correctAnswer;
        if(correct) {
            score += 10; scoreSpan.innerText = score; 
            correctCount++;  // <-- ЭТО УВЕЛИЧИВАЕТ ПРОГРЕСС МОСТА!
            messageDiv.innerHTML = `✅ ВЕРНО! +10 МВт | ${correctCount}/${TARGET_CORRECT}`; 
            flashEffect('correct');
            if(correctCount >= TARGET_CORRECT) { victoryGame(); return; }
        } else {
            health--; updateHealthIcon();
            messageDiv.innerHTML = `❌ ОШИБКА! Ответ: ${currentProblem.correctAnswer}. ${currentProblem.hint}`; 
            flashEffect('wrong');
            if(health <= 0) { gameDefeat(); return; }

        if(nextTimer) clearTimeout(nextTimer);
        nextTimer = setTimeout(() => { if(gameActive && !victoryFlag && health > 0 && !gameClosed && !isBlocked) loadNewChallenge(); nextTimer = null; }, 1300);
        updateUI();

        answersContainer.innerHTML = '';
        optionsArray.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'answer-btn';
            let suff = "";
            if(currentProblem.title.includes("МОЩНОСТЬ")) suff = " Вт";
            else if(currentProblem.title.includes("ОМА")) suff = " Ω";
            else if(currentProblem.title.includes("СОЕДИНЕНИЕ")) suff = " Ω";
            else if(currentProblem.title.includes("КПД")) suff = " Вт";
            else if(currentProblem.title.includes("РАБОТА")) suff = " Дж";
            btn.innerText = `${opt}${suff}`;
            btn.onclick = () => { if(!waitForAnswer && gameActive && !victoryFlag && !gameClosed && !isBlocked) handleAnswer(opt); };
            answersContainer.appendChild(btn);
        });
    }
    
    function victoryGame() {
        victoryFlag = true; gameActive = false; waitForAnswer = true;
        if(nextTimer) clearTimeout(nextTimer);
        messageDiv.innerHTML = `🏆✨ ПОБЕДА! ${score} МВт ✨🏆`;
        celebrateVictory();
        drawGame();
    }
    
    function gameDefeat() { gameActive = false; waitForAnswer = true; if(nextTimer) clearTimeout(nextTimer); messageDiv.innerHTML = `💥 КОЛЛАПС! ${correctCount}/15. Перезапустите.`; drawGame(); }
    
    function restart() {
        if(gameClosed || isBlocked) return;
        if(nextTimer) clearTimeout(nextTimer);
        score = 0; health = 3; correctCount = 0; gameActive = true; victoryFlag = false; waitForAnswer = false; usedTasks = [];
        scoreSpan.innerText = "0"; updateHealthIcon(); updateUI();
        if(gameReady && ALL_TASKS.length) loadNewChallenge();
        drawGame();
    }
    
    function flashEffect(type) {
        ctx.fillStyle = type === 'correct' ? 'rgba(100,255,100,0.4)' : 'rgba(255,100,100,0.4)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        setTimeout(() => drawGame(), 150);
    }
    
    auth.signInAnonymously().then(async (cred) => {
        currentUID = cred.user.uid;
        await registerOrUpdateUser(currentUID);
        listenGlobalMessages();
        setInterval(async () => { if (currentUID) await setOnlineStatus(currentUID, true); }, 30000);
        window.addEventListener('beforeunload', () => { if (currentUID) setOnlineStatus(currentUID, false); });
    }).catch(console.error);
    
    document.getElementById('restartGame').addEventListener('click', () => { if(!gameClosed && !isBlocked) restart(); });
    fetchTasksFromGitHub();
</script>
</body>
</html>
